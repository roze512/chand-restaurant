<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chand Restaurant Admin</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b0b0b;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #d4a84f;
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: #171717;
      border: 1px solid #333;
      padding: 25px;
    }

    .card h2 {
      color: #d4a84f;
      font-size: 32px;
      margin-top: 10px;
    }

    .section {
      background: #171717;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid #333;
    }

    .section h2 {
      color: #d4a84f;
      margin-bottom: 20px;
    }

    .order {
      border-bottom: 1px solid #333;
      padding: 15px 0;
    }

    .order p {
      margin: 6px 0;
      color: #bbb;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 12px;
      background: #d4a84f;
      color: #111;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      body {
        padding: 20px;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>CHAND RESTAURANT ADMIN PANEL</h1>

  <div class="cards">
    <div class="card">
      <p>Total Orders</p>
      <h2 id="totalOrders">0</h2>
    </div>

    <div class="card">
      <p>Total Bookings</p>
      <h2 id="totalBookings">0</h2>
    </div>

    <div class="card">
      <p>System Status</p>
      <h2>ONLINE</h2>
    </div>
  </div>

  <div class="section">
    <h2>Recent Orders</h2>
    <div id="orders"></div>
  </div>

  <div class="section">
    <h2>Table Bookings</h2>
    <div id="bookings"></div>
  </div>

  <script>
    async function loadDashboard() {
      const ordersResponse = await fetch(
        "http://localhost:5000/api/orders"
      )

      const bookingsResponse = await fetch(
        "http://localhost:5000/api/bookings"
      )

      const orders = await ordersResponse.json()
      const bookings = await bookingsResponse.json()

      document.getElementById("totalOrders").innerText =
        orders.length

      document.getElementById("totalBookings").innerText =
        bookings.length

      const ordersDiv = document.getElementById("orders")

      if (orders.length === 0) {
        ordersDiv.innerHTML = "<p>No orders yet.</p>"
      } else {
        ordersDiv.innerHTML = orders
          .map(
            (order) => `
              <div class="order">
                <strong>${order.customerName}</strong>
                <p>Phone: ${order.phone}</p>
                <p>Order Type: ${order.orderType}</p>
                <p>Total: Rs. ${order.total}</p>
                <span class="status">${order.status}</span>
              </div>
            `
          )
          .join("")
      }

      const bookingsDiv = document.getElementById("bookings")

      if (bookings.length === 0) {
        bookingsDiv.innerHTML = "<p>No bookings yet.</p>"
      } else {
        bookingsDiv.innerHTML = bookings
          .map(
            (booking) => `
              <div class="order">
                <strong>${booking.bookingName}</strong>
                <p>Phone: ${booking.bookingPhone}</p>
                <p>Date: ${booking.bookingDate}</p>
                <p>Time: ${booking.bookingTime}</p>
                <p>Guests: ${booking.guests}</p>
                <span class="status">${booking.status}</span>
              </div>
            `
          )
          .join("")
      }
    }

    loadDashboard()
  </script>

</body>
</html>
